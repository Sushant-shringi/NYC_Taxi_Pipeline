name: CI

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Validate Lambda Syntax
        run: |
          python -m py_compile src/taxi_extractor_lambda.py
          python -m py_compile src/taxi_transformer_lambda.py
          python -m py_compile src/taxi_loader_lambda.py